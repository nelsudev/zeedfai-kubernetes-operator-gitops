# Sample para o fluxo de DEV local (make demo-up + make run + make deploy-sample).
# Usa a imagem construída localmente e carregada no kind por `make images`
# (zeedfai/scorer:dev) — sem GHCR, sem imagePullSecret. Para o fluxo GitOps,
# ver gitops/infrastructure/demo/pipeline.yaml (imagens GHCR versionadas).
apiVersion: platform.zeedfai.io/v1alpha1
kind: ScoringPipeline
metadata:
  name: card-payments-eu
  namespace: default
spec:
  model:
    image: zeedfai/scorer:dev
  kafka:
    brokers: zeedfai-kafka-bootstrap.kafka:9092
    topic: transactions
    consumerGroup: scoring-eu
  slo:
    latencyP999Ms: 250
  scaling:
    minReplicas: 2
    maxReplicas: 20
    targetLagPerReplica: 1000
