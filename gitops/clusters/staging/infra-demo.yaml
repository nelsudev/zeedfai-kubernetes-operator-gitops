apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-demo
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-operator
    - name: infra-kafka-cluster
  interval: 30m
  path: ./gitops/infrastructure/demo
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
