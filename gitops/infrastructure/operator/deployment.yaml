apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeedfai-operator
  namespace: zeedfai-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: zeedfai-operator}
  template:
    metadata:
      labels: {app: zeedfai-operator}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: zeedfai-operator
      # Imagem privada no GHCR: requer o secret "ghcr-pull" (docker-registry),
      # criado fora do Git — ver gitops/infrastructure/operator/README.md.
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: operator
          image: ghcr.io/nelsudev/zeedfai-operator:0.3.3
          env:
            - name: ENABLE_LEADER_ELECTION
              value: "true"
            - name: PROMETHEUS_URL
              value: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
          ports:
            - name: health
              containerPort: 8082
            - name: metrics
              containerPort: 8083
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: {path: /readyz, port: health}
          livenessProbe:
            httpGet: {path: /healthz, port: health}
