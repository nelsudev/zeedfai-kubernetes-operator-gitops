apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: zeedfai-scorer
  namespace: flux-system
spec:
  image: ghcr.io/nelsudev/zeedfai-scorer
  interval: 1m
  secretRef:
    name: ghcr-pull
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: zeedfai-scorer
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: zeedfai-scorer
  filterTags:
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  policy:
    semver:
      range: ">=0.0.0"
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: zeedfai-scorer
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: "chore(gitops): update scorer image to {{range .Updated.Images}}{{println .}}{{end}}"
    push:
      branch: main
  update:
    path: ./gitops/infrastructure/demo
    strategy: Setters
