apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: zeedfai-system
---
# Leitura apenas: a API é uma fachada read-only sobre os pipelines; escritas
# de configuração acontecem via Git (GitOps), nunca por aqui.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zeedfai-platform-api
rules:
  - apiGroups: [platform.zeedfai.io]
    resources: [scoringpipelines]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zeedfai-platform-api
subjects:
  - kind: ServiceAccount
    name: platform-api
    namespace: zeedfai-system
roleRef:
  kind: ClusterRole
  name: zeedfai-platform-api
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: zeedfai-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: platform-api}
  template:
    metadata:
      labels: {app: platform-api}
    spec:
      serviceAccountName: platform-api
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: platform-api
          image: ghcr.io/nelsudev/zeedfai-platform-api:0.1.1
          env:
            - name: PROMETHEUS_URL
              value: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
            - name: LOADGEN_URL
              value: http://loadgen.default.svc:8081
          ports:
            - containerPort: 8090
          readinessProbe:
            httpGet: {path: /healthz, port: 8090}
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: zeedfai-system
spec:
  selector: {app: platform-api}
  ports:
    - port: 8090
