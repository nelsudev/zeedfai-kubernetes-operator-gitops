apiVersion: platform.zeedfai.io/v1alpha1
kind: ScoringPipeline
metadata:
  name: card-payments-eu
  namespace: default
spec:
  model:
    image: ghcr.io/nelsudev/zeedfai-scorer:0.2.0 # {"$imagepolicy": "flux-system:zeedfai-scorer"}
    imagePullSecret: ghcr-pull
  # Demo de rollback automático de canary (2026-07-07): com
  # image=zeedfai-scorer:bad-canary (FAULT_RATE=0.5) aqui, o operator
  # detetou a taxa de erro e fez rollback sozinho em ~80s — ver Event
  # CanaryRolledBack no histórico. Reativar com uma imagem candidata real.
  canary:
    enabled: false
  kafka:
    brokers: zeedfai-kafka-bootstrap.kafka:9092
    topic: transactions
    consumerGroup: scoring-eu
  slo:
    latencyP999Ms: 250
  scaling:
    minReplicas: 2
    maxReplicas: 20
    targetLagPerReplica: 1000
