#cloud-config
package_update: true
packages: [curl]
write_files:
  - path: /etc/netplan/60-hetzner-private.yaml
    permissions: "0644"
    content: |
      network:
        version: 2
        ethernets:
          enp7s0:
            addresses:
              - ${private_ip}/32
            routes:
              - to: 10.0.0.1/32
                scope: link
              - to: 10.0.0.0/16
                via: 10.0.0.1
runcmd:
  - netplan apply
  - PUBLIC_IPV4="$(curl -fsS http://169.254.169.254/hetzner/v1/metadata/public-ipv4)" && curl -sfL https://get.k3s.io | K3S_TOKEN="${k3s_token}" INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --node-ip ${private_ip} --advertise-address ${private_ip} --tls-san ${private_ip} --tls-san $PUBLIC_IPV4 --flannel-iface enp7s0" sh -
